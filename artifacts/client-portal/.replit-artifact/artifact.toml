kind = "web"
previewPath = "/"
title = "Design Studio Client Portal"
version = "1.0.0"
id = "artifacts/client-portal"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25516

[services.development]
run = "pnpm --filter @workspace/client-portal run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/client-portal", "run", "build" ]
publicDir = "artifacts/client-portal/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25516"
BASE_PATH = "/"
